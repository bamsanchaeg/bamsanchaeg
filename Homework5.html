<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel = "stylesheet" href ="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1fgjWPGmkzs7" crossorigin="anonymous">
        <style>
            .table{
                white-space: nowrap;
                text-align: center;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="row fixed-top">
            <button class="btn fs-4" style="color: black; background-color: white; font-family:'Courier New', Courier, monospace;" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasTop" aria-controls="offcanvasTop">
                <h6>Cabinet</h6>
                <li style="list-style-type: none; font-size: 0.6em;">Social Jazz Club</li>
                </button>
                <div class="offcanvas offcanvas-top" tabindex="-1" id="offcanvasTop" aria-labelledby="offcanvasTopLabel">
                <div class="offcanvas-header my-1" style="font-family: 'Courier New', Courier, monospace;">
                    <h5 class="offcanvas-title" id="offcanvasTopLabel">Menu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="" style="list-style-type: none; padding: 0px;">
                    <li><a class="menu1" style="text-decoration-line:none; color:black" href="#">Agenda</a></li>
                    <li><a class="menu1" style="text-decoration-line:none; color:black" href="#">History</a></li>
                    <li><a class="menu1" style="text-decoration-line:none; color:black" href="#">Guestbook</a></li>
                    </ul>
                </div>
                </div>
            </div>

            <div class="row">
                <image class="img-fluid" src="Interaced.png"></image>
            </div>
            <div class="row my-3">
                <div class="col text-center" style="font-family: 'Courier New', Courier, monospace;">Cat on the CongCong Han-River</div>
            </div>
            <!--overflow, 근데 미관상 별로라서 이미지만 슬라이드할때 써먹어야할듯 overflow 폴더로 옮겼음-->
            <div class="row">
                <div class="col">
                    <image class="img-fluid" src="discord-round-black-icon.png" style="padding : 25%"></image>
                    <div class="row">
                        <div class="col text-center" style="font-size: 0.8em;">Community</div>
                    </div>
                </div>
                <div class="col">
                    <image class="img-fluid" src="JazzIcon.png" style="padding : 25%"></image>
                    <div class="row">
                        <div class="col text-center" style="font-size: 0.8em;">Jam</div>
                    </div>
                </div>
                <div class="col">
                    <image class="img-fluid" src="YoutubeIcon.png" style="padding : 25%"></image>
                    <div class="row">
                        <div class="col text-center" style="font-size: 0.8em;">Youtube</div>
                    </div>
                </div>
                <div class="col">
                    <image class="img-fluid" src="img_10.png" style="padding : 15%"></image>
                    <div class="row">
                        <div class="col text-center" style="font-size: 0.8em;">Home</div>
                    </div>
                </div>
               
            </div>
                
            <!--Upcoming-->
            <div class="row">
                <h6 class="mt-3" style="font-size: large;">Upcoming Performance</h6>
                <image class="img-fluid mb-2" src="Banner2.png"></image>
                <ul>
                    <h6>The table</h6>
                    <p style="font-size: 0.8em;">2024 December 28, 7:00pm</p>
                </ul>
            </div>

            <!--History-->
            <div class="row">
                <h6 class="my-3"style="font-size: large;">History</h6>
                </div>
            <div class="row">
                <div id="carouselExample" class="carousel slide">
                    <div class="carousel-inner">
                      <div class="carousel-item active">
                        <img src="Banner.png" class="d-block w-100" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="Banner4.png" class="d-block w-100" alt="...">
                      </div>
                      <div class="carousel-item">
                        <img src="Banner3.png" class="d-block w-100" alt="...">
                      </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                      <span class="carousel-control-next-icon" aria-hidden="true"></span>
                      <span class="visually-hidden">Next</span>
                    </button>
                  </div>
                </div>

            <div class="row fixed-bottom">
                <button class="btn" style="background-color: white; font-size: 0.8em; font-family: 'Courier New', Courier, monospace;" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasBottom" aria-controls="offcanvasBottom" >Upcoming Performance</button>

                    <div class="offcanvas offcanvas-bottom" tabindex="-1" id="offcanvasBottom" aria-labelledby="offcanvasBottomLabel">
                    <div class="offcanvas-header">
                        <h6 class="offcanvas-title" id="offcanvasBottomLabel" style="font-family: 'Courier New', Courier, monospace;">Upcoming</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body small" style="font-family: 'Courier New', Courier, monospace;">
                        <ul>
                            <h6>The table</h6>
                            <li style="list-style-type: none;">12월 29일 7:00pm 살롱문보우</li>
                        </ul>
                    </div>
                </div>

            </div>
      

        </div>






    <script src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>   
    </body>



 </html>
